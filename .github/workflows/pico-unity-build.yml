name: Pico Unity Build

on:
  workflow_dispatch:

jobs:
  build-pico-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Android APK with Unity
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: Pico4Unity
          targetPlatform: Android
          unityVersion: 2022.3.48f1
          buildName: GoKartsPico4
          buildsPath: Pico4Unity/Builds
          androidExportType: androidPackage

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GoKartsPico4-apk
          path: Pico4Unity/Builds/Android/*.apk
          if-no-files-found: warn
