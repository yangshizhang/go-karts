name: iOS Build

on:
  workflow_dispatch:
    inputs:
      export_method:
        description: "IPA export method: development, ad-hoc, app-store, or enterprise"
        required: true
        default: ad-hoc
        type: choice
        options:
          - development
          - ad-hoc
          - app-store
          - enterprise
  push:
    branches:
      - main
      - master

jobs:
  simulator-build:
    name: Compile Simulator Build
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Install CocoaPods Dependencies
        run: pod install

      - name: Compile for iOS Simulator
        run: |
          xcodebuild build \
            -workspace GoKartsRacingLines.xcworkspace \
            -scheme GoKartsRacingLines \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO

  signed-ipa:
    name: Build Signed IPA
    runs-on: macos-15
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Validate Signing Secrets
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
        run: |
          test -n "$BUILD_CERTIFICATE_BASE64"
          test -n "$BUILD_PROVISION_PROFILE_BASE64"
          test -n "$P12_PASSWORD"
          test -n "$KEYCHAIN_PASSWORD"
          test -n "$DEVELOPMENT_TEAM"

      - name: Install CocoaPods Dependencies
        run: pod install

      - name: Install Apple Signing Assets
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          PP_PATH="$RUNNER_TEMP/build_profile.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' /dev/stdin <<< "$(security cms -D -i "$PP_PATH")")
          cp "$PP_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"

      - name: Read Provisioning Profile Metadata
        run: |
          PROFILE_PLIST="$RUNNER_TEMP/profile.plist"
          security cms -D -i "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision" > "$PROFILE_PLIST"
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print Name' "$PROFILE_PLIST")
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"

      - name: Apply Runtime Configuration
        env:
          AMAP_API_KEY: ${{ secrets.AMAP_API_KEY }}
        run: |
          if [ -n "$AMAP_API_KEY" ]; then
            /usr/libexec/PlistBuddy -c "Set :AMapApiKey $AMAP_API_KEY" GoKartsRacingLines/Resources/Info.plist
          fi

      - name: Archive App
        env:
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
          BUNDLE_IDENTIFIER: ${{ secrets.BUNDLE_IDENTIFIER }}
        run: |
          PRODUCT_BUNDLE_IDENTIFIER_ARG=""
          if [ -n "$BUNDLE_IDENTIFIER" ]; then
            PRODUCT_BUNDLE_IDENTIFIER_ARG="PRODUCT_BUNDLE_IDENTIFIER=$BUNDLE_IDENTIFIER"
          fi

          xcodebuild archive \
            -workspace GoKartsRacingLines.xcworkspace \
            -scheme GoKartsRacingLines \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/GoKartsRacingLines.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            $PRODUCT_BUNDLE_IDENTIFIER_ARG

      - name: Create Export Options
        env:
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
          EXPORT_METHOD: ${{ inputs.export_method }}
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>$EXPORT_METHOD</string>
            <key>teamID</key>
            <string>$DEVELOPMENT_TEAM</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

      - name: Export IPA
        run: |
          mkdir -p build/ipa
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/GoKartsRacingLines.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath build/ipa

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GoKartsRacingLines-ipa
          path: build/ipa/*.ipa
          if-no-files-found: error
